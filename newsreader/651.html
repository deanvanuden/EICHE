<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>An Error Occurred: Not Found</title>
    <style>body { background-color: #fff; color: #222; font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; }
.container { margin: 30px; max-width: 600px; }
h1 { color: #dc3545; font-size: 24px; }
h2 { font-size: 18px; }</style>
</head>
<body>
<div class="container">
    <h1>Oops! An Error Occurred</h1>
    <h2>The server returned a "404 Not Found".</h2>

    <p>
        Something is broken. Please let us know what you were doing when this error occurred.
        We will fix it as soon as possible. Sorry for any inconvenience caused.
    </p>
</div>
<script id="eiche-nav-bridge">
(function(){
  function init(){
    var active = null;
    var activeHeader = null;
    var closeTimer = null;
    var items = Array.prototype.slice.call(document.querySelectorAll('.header .mainmenu ul.level_1 > li.submenu'));

    function clearClose(){
      if(closeTimer){ clearTimeout(closeTimer); closeTimer = null; }
    }

    function open(item){
      clearClose();
      if(active && active !== item) active.classList.remove('eiche-submenu-open');
      active = item;
      activeHeader = item.closest('.header') || document.querySelector('.header');
      item.classList.add('eiche-submenu-open');
    }

    function closeNow(){
      clearClose();
      if(active) active.classList.remove('eiche-submenu-open');
      active = null;
      activeHeader = null;
    }

    function closeSoon(delay){
      clearClose();
      closeTimer = setTimeout(closeNow, delay || 160);
    }

    function inside(rect, x, y, pad){
      if(!rect) return false;
      pad = pad || 0;
      return x >= rect.left - pad && x <= rect.right + pad && y >= rect.top - pad && y <= rect.bottom + pad;
    }

    function isInsideOpenArea(x, y){
      if(!active) return false;
      var menu = active.querySelector('ul.level_2');
      if(!menu) return false;
      var menuRect = menu.getBoundingClientRect();
      var headerRect = (activeHeader || active.closest('.header') || document.querySelector('.header')).getBoundingClientRect();
      var itemRect = active.getBoundingClientRect();

      if(inside(menuRect, x, y, 10) || inside(headerRect, x, y, 6) || inside(itemRect, x, y, 8)) return true;

      var bandTop = Math.min(headerRect.top, itemRect.top, menuRect.top) - 8;
      var bandBottom = Math.max(headerRect.bottom, itemRect.bottom, menuRect.top) + 34;
      return x >= 0 && x <= window.innerWidth && y >= bandTop && y <= bandBottom;
    }

    items.forEach(function(item){
      var menu = item.querySelector('ul.level_2');
      item.addEventListener('mouseenter', function(){ open(item); });
      item.addEventListener('pointerenter', function(){ open(item); });
      item.addEventListener('focusin', function(){ open(item); });
      if(menu){
        menu.addEventListener('mouseenter', function(){ open(item); });
        menu.addEventListener('pointerenter', function(){ open(item); });
        menu.addEventListener('pointerdown', function(){ open(item); });
      }
    });

    document.addEventListener('pointermove', function(e){
      if(!active) return;
      if(isInsideOpenArea(e.clientX, e.clientY)) clearClose();
      else closeSoon(180);
    }, {passive:true});

    document.addEventListener('pointerdown', function(e){
      if(active && !isInsideOpenArea(e.clientX, e.clientY)) closeNow();
    }, {passive:true});

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape') closeNow();
    });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
</body>
</html>
